<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نشمي AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --jordan-red: #CE1126;
            --jordan-green: #007A3D;
            --bg-dark: #0a0a0a;
            --ai-bubble: #ffffff;
            --user-bubble: #1e1e1e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; height: 100dvh; overflow: hidden; background: var(--bg-dark); font-family: 'Tajawal', sans-serif; color: #fff; }
        body { display: flex; }

        .sidebar { width: 280px; background: #111; display: flex; flex-direction: column; padding: 20px; border-left: 2px solid var(--jordan-red); transition: 0.4s ease; position: fixed; right: 0; top: 0; bottom: 0; z-index: 2000; box-shadow: -10px 0 40px rgba(0,0,0,0.9); }
        .sidebar.closed { transform: translateX(100%); }
        .toggle-btn { position: absolute; left: -50px; top: 15px; background: var(--jordan-red); color: white; border: none; width: 50px; height: 50px; border-radius: 12px 0 0 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        .main-content { flex: 1; display: flex; flex-direction: column; height: 100%; width: 100%; overflow: hidden; }
        .header { height: 65px; background: rgba(10,10,10,0.95); backdrop-filter: blur(15px); border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        
        /* العلم الأردني المصحح */
        .jordan-flag { width: 42px; height: 21px; position: relative; border: 0.5px solid #444; display: flex; flex-direction: column; overflow: hidden; border-radius: 2px; margin-left: 10px; }
        .flag-black { background: #000; flex: 1; }
        .flag-white { background: #fff; flex: 1; }
        .flag-green { background: var(--jordan-green); flex: 1; }
        .flag-triangle { position: absolute; top: 0; right: 0; height: 100%; width: 18px; background: var(--jordan-red); clip-path: polygon(100% 0, 0 50%, 100% 100%); display: flex; align-items: center; justify-content: center; }
        .flag-star { color: white; font-size: 8px; }

        .chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .message { max-width: 88%; padding: 14px 16px; border-radius: 18px; line-height: 1.6; font-size: 15.5px; animation: fadeIn 0.3s ease; position: relative; word-wrap: break-word; }
        .user { background: var(--user-bubble); align-self: flex-end; border-bottom-left-radius: 4px; border: 1px solid #333; }
        .ai { background: var(--ai-bubble); color: #000; align-self: flex-start; border-right: 5px solid var(--jordan-green); border-bottom-right-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .copy-btn { position: absolute; top: -10px; left: 10px; background: var(--jordan-green); color: white; border: none; padding: 4px 8px; border-radius: 8px; font-size: 10px; cursor: pointer; }

        .input-area { background: #0d0d0d; padding: 10px; border-top: 1px solid #222; flex-shrink: 0; }
        .file-preview { display: none; background: #1a1a1a; padding: 8px 15px; border-radius: 10px; margin-bottom: 8px; align-items: center; gap: 10px; border: 1px solid var(--jordan-green); }
        .input-wrapper { display: flex; gap: 8px; max-width: 900px; margin: 0 auto; align-items: center; }
        input[type="text"] { flex: 1; height: 50px; background: #1a1a1a; border: 1px solid #333; border-radius: 15px; color: #fff; padding: 0 15px; outline: none; }
        .action-btn { background: #1a1a1a; border: 1px solid #333; width: 50px; height: 50px; border-radius: 15px; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .send-btn { background: var(--jordan-green); border: none; width: 60px; font-weight: bold; }

        img.preview-img { max-width: 200px; border-radius: 10px; margin-top: 5px; border: 1px solid #444; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar closed" id="sidebar">
        <button class="toggle-btn" onclick="toggleSidebar()">◀</button>
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 style="color: var(--jordan-red);">نشمي AI</h2>
            <p style="font-size: 11px; color: #888;">تطوير: محمد العمري</p>
        </div>
        <button onclick="createNewChat()" style="background: var(--jordan-red); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer;">+ محادثة جديدة</button>
        <div id="chatList" style="flex: 1; overflow-y: auto; margin-top: 20px;"></div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="jordan-flag">
                <div class="flag-black"></div><div class="flag-white"></div><div class="flag-green"></div>
                <div class="flag-triangle"><span class="flag-star">★</span></div>
            </div>
            <span style="font-weight: 700; font-size: 24px;">نشمي <span style="color:#FFD700">AI</span></span>
        </div>
        
        <div class="chat-container" id="chatContainer"></div>

        <div class="input-area">
            <div id="fileStatus" class="file-preview">
                <span id="fileName" style="flex:1; font-size:12px; color:var(--jordan-green)"></span>
                <span onclick="cancelFile()" style="color:red; cursor:pointer; font-weight:bold;">✕</span>
            </div>
            <div class="input-wrapper">
                <label class="action-btn">
                    <input type="file" id="fileInput" style="display: none;" onchange="handleFile(event)" accept="image/*,.pdf,.xlsx,.csv,.txt">📎
                </label>
                <input type="text" id="userInput" placeholder="اسأل نشمي وأبشر..." autocomplete="off">
                <button class="action-btn send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        const API_URL = "https://api.groq.com/openai/v1/chat/completions";
        
        let chats = JSON.parse(localStorage.getItem('nashmi_v60')) || [];
        let currentId = null;
        let activeFile = { type: "", data: "", name: "" };

        async function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            activeFile.name = file.name;
            const ext = file.name.split('.').pop().toLowerCase();

            if (['jpg', 'jpeg', 'png', 'webp'].includes(ext)) {
                activeFile.type = "image";
                const reader = new FileReader();
                reader.onload = (e) => { activeFile.data = e.target.result; showFileBar(); };
                reader.readAsDataURL(file);
            } else if (ext === 'pdf') {
                activeFile.type = "text";
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const typedarray = new Uint8Array(e.target.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let text = "";
                    for(let i=1; i<=pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(item => item.str).join(" ") + " ";
                    }
                    activeFile.data = text; showFileBar();
                };
                reader.readAsArrayBuffer(file);
            } else {
                activeFile.type = "text";
                const reader = new FileReader();
                reader.onload = (e) => { activeFile.data = e.target.result; showFileBar(); };
                reader.readAsText(file);
            }
        }

        function showFileBar() {
            document.getElementById('fileStatus').style.display = 'flex';
            document.getElementById('fileName').innerText = "📎 جاهز: " + activeFile.name;
        }

        function cancelFile() { activeFile = { type: "", data: "", name: "" }; document.getElementById('fileStatus').style.display = 'none'; }

        function init() {
            if (chats.length === 0) createNewChat();
            else loadChat(chats[0].id);
            renderList();
        }

        function createNewChat() {
            const id = 'chat_' + Date.now();
            chats.unshift({ id, title: "محادثة جديدة", messages: [] });
            save(); loadChat(id);
        }

        function loadChat(id) {
            currentId = id;
            const chat = chats.find(c => c.id === id);
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
            if(chat.messages.length === 0) append("هلا يا نشمي! ارفع صورة أو ملف وأبشر باللي بدك اياه.", "ai");
            else chat.messages.forEach(m => append(m.text, m.role, false, m.fileName, m.imgData));
            scrollToBottom();
        }

        function append(text, role, scroll = true, fileName = null, imgData = null) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            let html = role === 'ai' ? `<button class="copy-btn" onclick="copyText(this)">نسخ</button>` : "";
            if (imgData) html += `<img src="${imgData}" class="preview-img"><br>`;
            if (fileName && !imgData) html += `<div style="font-size:12px; border-bottom:1px solid #555; margin-bottom:5px;">📄 ${fileName}</div>`;
            
            div.innerHTML = html + marked.parse(text);
            container.appendChild(div);
            if(scroll) setTimeout(() => div.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
        }

        async function handleSend() {
            const input = document.getElementById('userInput');
            const userMsg = input.value.trim();
            if (!userMsg && !activeFile.data) return;

            const chat = chats.find(c => c.id === currentId);
            const fileData = activeFile.data;
            const fileType = activeFile.type;
            const fileName = activeFile.name;

            append(userMsg || "حلل هالصورة", 'user', true, fileName, fileType === "image" ? fileData : null);
            
            let messageContent;
            if (fileType === "image") {
                messageContent = [
                    { type: "text", text: userMsg || "ماذا يوجد في هذه الصورة؟" },
                    { type: "image_url", image_url: { url: fileData } }
                ];
            } else {
                messageContent = (fileType === "text" ? `[محتوى الملف ${fileName}]:\n${fileData}\n\n` : "") + userMsg;
            }

            chat.messages.push({ role: 'user', text: userMsg || "تحليل", fileName, imgData: fileType === "image" ? fileData : null, apiContent: messageContent });
            input.value = ''; cancelFile();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: fileType === "image" ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "أنت نشمي AI، مساعد أردني ذكي. مطورك محمد العمري. أجب بلهجة أردنية لبقة." },
                            { role: "user", content: messageContent }
                        ]
                    })
                });

                const data = await response.json();
                const aiRes = data.choices[0].message.content;
                append(aiRes, 'ai');
                chat.messages.push({ role: 'ai', text: aiRes });
                save();
            } catch (e) {
                append("المعذرة يا نشمي، صار ضغط بالشبكة. جرب كمان مرة.", "ai");
            }
        }

        function copyText(btn) {
            navigator.clipboard.writeText(btn.parentElement.innerText.replace("نسخ", ""));
            btn.innerText = "تم!"; setTimeout(() => btn.innerText = "نسخ", 2000);
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('closed'); }
        function scrollToBottom() { const c = document.getElementById('chatContainer'); c.scrollTop = c.scrollHeight; }
        function save() { localStorage.setItem('nashmi_v60', JSON.stringify(chats)); renderList(); }
        function renderList() {
            const list = document.getElementById('chatList'); list.innerHTML = '';
            chats.forEach(c => {
                const div = document.createElement('div');
                div.className = "chat-item";
                div.style = "padding:10px; background:#1a1a1a; margin-bottom:8px; border-radius:10px; cursor:pointer; border:1px solid #333; font-size:13px;";
                div.innerHTML = `💬 ${c.title}`;
                div.onclick = () => loadChat(c.id);
                list.appendChild(div);
            });
        }

        init();
        document.getElementById('sendBtn').onclick = handleSend;
        document.getElementById('userInput').onkeydown = (e) => { if(e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
